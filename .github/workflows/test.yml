name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        if: success()

      - name: Run tests
        run: npm run test:run

      - name: Test summary
        run: echo "✅ All tests passed and build succeeded"
        if: success()

      - name: Test failed
        run: echo "❌ Tests failed - deployment blocked"
        if: failure()
